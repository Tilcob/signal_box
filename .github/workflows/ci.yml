# CI: the sim core runs as a fast separate job (the determinism proof —
# golden hashes must match on Windows AND Linux). The full workspace incl.
# the Bevy frontend joined with M1 (plan M1 §7).
name: ci
on: [push, pull_request]
jobs:
  sim:
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - run: cargo test -p stellwerk_sim
      - run: cargo clippy -p stellwerk_sim --all-targets -- -D warnings
      - run: cargo fmt -p stellwerk_sim -- --check
  app:
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev libudev-dev pkg-config libwayland-dev libxkbcommon-dev
      - run: cargo test --workspace
      - run: cargo clippy --workspace --all-targets -- -D warnings
